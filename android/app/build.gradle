plugins {
    id "com.android.application"
    id "com.chaquo.python"
}

android {
    namespace "com.jimmy.agent"
    compileSdk 34

    defaultConfig {
        applicationId "com.jimmy.agent"
        minSdk 24
        // ВАЖНО: targetSdk >= 29 включает SELinux-запрет на exec() программ
        // из приватной папки приложения (error=13 Permission denied).
        // Termux держит targetSdk 28 по той же причине — мы тоже.
        targetSdk 28
        versionCode 13
        versionName "0.5.3"

        python {
            version "3.12"
        }
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }
}
