plugins {
    id "com.android.application"
    id "com.chaquo.python"
}

android {
    namespace "com.jimmy.agent"
    compileSdk 34

    defaultConfig {
        applicationId "com.jimmy.agent"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "0.1"

        python {
            version "3.12"
        }
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }
}
