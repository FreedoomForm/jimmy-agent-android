# Codex CLI → ChatJimmy через jimmy-proxy (без облака, без ключей)
model = "llama3.1-8B"
model_provider = "chatjimmy"
approval_policy = "never"
# seccomp-песочница codex (workspace-write) несовместима с Android-ядром → SIGSYS.
sandbox_mode = "danger-full-access"
# Заменяем стоковые базовые инструкции codex (24К символов по-английски)
# на наш компактный русский SYSTEM.md из рабочей папки — модель слушается
# лучше, а контекст экономится в 6 раз.
experimental_instructions_file = "SYSTEM.md"

# Реальный потолок контекста ChatJimmy неизвестен и модель «дурнеет» на
# длинных промптах — держим диалог компактным. Codex будет автоматически
# сжимать (compact) историю, когда она подходит к лимиту.
model_context_window = 12288
model_auto_compact_token_limit = 9000

[model_providers.chatjimmy]
name = "ChatJimmy via jimmy-proxy (Taalas ASIC, ~17K tok/s)"
base_url = "http://127.0.0.1:4100/v1"
env_key = "CHATJIMMY_API_KEY"
wire_api = "chat"

# Дочернем процессы инструментов запускаются с ЧИСТЫМ окружением; по умолчанию
# codex оставляет только «core»-набор (PATH есть, LD_LIBRARY_PATH — нет),
# из-за чего Termux-бинари не линкуются (libandroid-support.so not found).
[shell_environment_policy]
inherit = "all"
# Детерминированное дублирование окружения Termux в КАЖДЫЙ tool-процесс —
# срабатывает независимо от inherit (шаг set применяется последним).
# Пути фиксированные: пакет com.jimmy.agent → /data/data/com.jimmy.agent/files.
set = { PREFIX = "/data/data/com.jimmy.agent/files/usr", HOME = "/data/data/com.jimmy.agent/files/home", TMPDIR = "/data/data/com.jimmy.agent/files/usr/tmp", SHELL = "/data/data/com.jimmy.agent/files/usr/bin/bash", LD_LIBRARY_PATH = "/data/data/com.jimmy.agent/files/usr/lib", PATH = "/data/data/com.jimmy.agent/files/usr/bin:/data/data/com.jimmy.agent/files/usr/bin/applets:/system/bin:/system/xbin", LANG = "C.UTF-8" }
