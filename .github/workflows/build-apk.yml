name: build-apk

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK — лицензии
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true

      - name: Android SDK — platform 34 + build-tools
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Gradle 8.5
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          /opt/gradle-8.5/bin/gradle --version

      - name: Сборка debug APK
        run: /opt/gradle-8.5/bin/gradle --no-daemon -p android assembleDebug --stacktrace

      - name: Артефакт APK
        uses: actions/upload-artifact@v4
        with:
          name: JimmyAgent-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
